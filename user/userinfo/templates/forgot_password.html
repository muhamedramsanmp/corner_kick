{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(rgba(20,27,43,0.7), rgba(20,27,43,0.7)),
    background: #eef2f7;
    background-size: cover;
    background-position: center;
}

.card {
    width: 100%;
    max-width: 420px;
    background: white;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
}


.logo {
    font-size: 12px;
    font-weight: 900;
    margin-bottom: 20px;
}


.icon-box {
    width: 60px;
    height: 60px;
    margin: auto;
    background: #eef2ff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 15px;
}

.title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
}

.desc {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 20px;
}

.field {
    text-align: left;
    margin-bottom: 15px;
}

.field label {
    font-size: 11px;
    font-weight: 700;
    display: block;
    margin-bottom: 5px;
}

.field input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #eef2ff;
}


.btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg,#3a5bff,#5a78ff);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}


.back {
    margin-top: 15px;
    font-size: 13px;
}

.back a {
    color: #2563eb;
    text-decoration: none;
}

.error {
    color: red;
    font-size: 12px;
    margin-bottom: 10px;
}
.btn {
    display: inline-block;   /* REQUIRED for <a> */
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg,#3a5bff,#5a78ff);
    color: white;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    text-decoration: none;   /* remove underline */
}
@media(max-width:480px){

    body{
        padding:16px;
    }

    .card{
        padding:20px 16px;
        border-radius:12px;
    }

    .title{
        font-size:18px;
    }

}
</style>
</head>

<body>

<div class="card">

    <div class="logo">CORNER KICK</div>

    <div class="icon-box">
        <span class="material-symbols-outlined">lock_reset</span>
    </div>

    <h2 class="title">Forgot Password?</h2>
    <p class="desc">Enter your email and we’ll send a reset link</p>

    <form method="POST" action="{% url 'userinfo:forgot_password' %}">
    {% csrf_token %}

    <div class="field">
        <label>EMAIL ADDRESS</label>
        <input type="email" name="email" required>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <button type="submit" class="btn">
        SUBMIT
    </button>
</form>

    <div class="back">
        <a href="{% url 'userinfo:profile' %}">← Back to   Profile</a>
    </div>

</div>

</body>
</html>
