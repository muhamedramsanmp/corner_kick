{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(rgba(20,27,43,0.7), rgba(20,27,43,0.7)),
    background-size: cover;
    background: #eef2f7;
}

.card {
    width: 100%;
    max-width: 420px;
    background: white;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
}


.icon-box {
    width: 60px;
    height: 60px;
    margin: auto;
    background: #eef2ff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 15px;
}

.title {
    font-size: 22px;
    font-weight: 700;
}

.desc {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 20px;
}


.field {
    text-align: left;
    margin-bottom: 15px;
}

.field label {
    font-size: 11px;
    font-weight: 700;
    display: block;
    margin-bottom: 5px;
}

.input-box {
    position: relative;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #eef2ff;
}

.input-box span {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

.btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg,#3a5bff,#5a78ff);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.error {
    color: red;
    font-size: 12px;
    margin-bottom: 10px;
}

.secure {
    margin-top: 15px;
    font-size: 12px;
    color: #64748b;
}
</style>
</head>

<body>

<div class="card">

    <div class="icon-box">
        <span class="material-symbols-outlined">lock</span>
    </div>

    <h2 class="title">Reset Password</h2>
    <p class="desc">Create a new strong password</p>

    <form method="POST">
        {% csrf_token %}

        <!-- NEW PASSWORD -->
        <div class="field">
            <label>NEW PASSWORD</label>
            <div class="input-box">
                <input type="password" name="password" required>
                <span onclick="togglePassword(this)">👁</span>
            </div>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="field">
            <label>CONFIRM PASSWORD</label>
            <div class="input-box">
                <input type="password" name="confirm_password" required>
                <span onclick="togglePassword(this)">👁</span>
            </div>
        </div>

        <!-- ERRORS -->
        {% if messages %}
            {% for message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <button type="submit" class="btn">Save Password</button>

    </form>

    <div class="secure">
        🔒 Your password is securely encrypted
    </div>

</div>

<script>
function togglePassword(icon) {
    const input = icon.previousElementSibling;

    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}
</script>

<script>
history.pushState(null, null, location.href);
window.onpopstate = function () {
    history.go(1);
};
</script>

</body>
</html>
