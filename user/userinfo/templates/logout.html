{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logout</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif;}
body{background:#eef2f7;}

.background {
    filter: blur(4px);
    opacity: 0.6;
    pointer-events: none;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    display:flex;
    justify-content:center;
    align-items:center;
}


.modal{
    background:#fff;
    width:380px;
    padding:35px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,0.3);
}


.icon{
    width:60px;
    height:60px;
    margin:0 auto 15px;
    border-radius:50%;
    background:#eef2f7;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}


.modal h2{
    margin-bottom:8px;
}
.modal p{
    color:#64748b;
    margin-bottom:25px;
}


.actions{
    display:flex;
    gap:12px;
}

.cancel{
    flex:1;
    padding:12px;
    border-radius:10px;
    background:#f1f5f9;
    text-decoration:none;
    color:#334155;
    font-weight:600;
    text-align:center;
}

.logout-btn{
    flex:1;
    padding:12px;
    border-radius:10px;
    background:#1e293b;
    color:#fff;
    border:none;
    font-weight:600;
}
</style>
</head>

<body>

<!-- 🔥 BACKGROUND PROFILE PAGE -->
<div class="background">
    {% include "profile.html" %}
</div>

<!-- 🔥 LOGOUT MODAL -->
<div class="overlay">

    <div class="modal">

        <div class="icon">⎋</div>

        <h2>Log Out</h2>
        <p>Are you sure you want to log out?</p>

        <div class="actions">

            <a href="{% url 'userinfo:profile' %}" class="cancel">
                CANCEL
            </a>

            <form method="POST" action="{% url 'userinfo:logout_user' %}">
    {% csrf_token %}
    <button type="submit" class="logout-btn">
        LOG OUT
    </button>
</form>

        </div>

    </div>

</div>


</body>
</html>
