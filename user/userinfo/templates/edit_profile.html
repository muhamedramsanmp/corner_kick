{% extends 'base.html' %}
{% load static %}

{% block title %}
Edit profile
{% endblock %}


{% block extra_css %}

<style>


.main{

    width:100%;

    padding:50px 20px 80px;

    display:flex;

    justify-content:center;

}

.card{

    width:100%;

    max-width:650px;

    background:#ffffff;

    padding:50px;

    border-radius:32px;

    border:1px solid #e2e8f0;

    box-shadow:
        0 20px 40px rgba(15,23,42,.05);

}

.avatar-wrapper{

    position:relative;

    width:140px;

    margin:auto;

}

.avatar{

    width:140px;

    height:140px;

    border-radius:50%;

    overflow:hidden;

    border:5px solid #ffffff;

    box-shadow:
        0 12px 30px rgba(15,23,42,.12);

}
.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.camera {
    position: absolute;
    bottom: 0;
    right: 0;
    background: #2563eb;
    color: white;
    border-radius: 50%;
    padding: 6px;
}

.title{

    margin-top:24px;

    font-size:36px;

    font-weight:800;

    color:#0f172a;

    margin-bottom:32px;

}

.form{

    margin-top:10px;

}

.field {
    margin-bottom: 20px;
}

.field label{

    font-size:13px;

    font-weight:700;

    color:#475569;

    letter-spacing:.4px;

}
.field input{

    width:100%;

    height:60px;

    padding:0 20px;

    margin-top:8px;

    border:none;

    border-radius:18px;

    background:#eef2f7;

    font-size:15px;

    font-weight:600;

    color:#0f172a;

    outline:none;

    transition:.2s;

}

.field input:focus{

    box-shadow:
        0 0 0 4px rgba(37,99,235,.10);

}
.actions{

    display:flex;

    gap:14px;

    margin-top:30px;

}

.btn{

    flex:1;

    height:54px;

    border-radius:16px;

    border:none;

    font-size:14px;

    font-weight:700;

    display:flex;

    align-items:center;

    justify-content:center;

    text-decoration:none;

    transition:.2s;

}

.cancel{

    background:#f1f5f9;

    color:#475569;

}

.cancel:hover{

    background:#e2e8f0;

}
.save{

    background:
        linear-gradient(
            90deg,
            #2563eb,
            #3b82f6
        );

    color:white;

}

.save:hover{

    transform:translateY(-2px);

    box-shadow:
        0 12px 24px rgba(37,99,235,.22);

}
.sidebar-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    text-decoration: none;
    color: #64748b;
    font-weight: 600;
    border-radius: 10px;
    transition: 0.2s;
    position: relative;
}

.icon {
    width: 22px;
    height: 22px;
    fill: currentColor; 
}

.sidebar-item:hover {
    background: #e8edff;
    color: #2563eb;
}


.sidebar-item.active {
    background: #eaf0ff;
    color: #2563eb;
}

.sidebar-item.active::after {
    content: "";
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    width: 4px;
    background: #2563eb;
    border-radius: 4px;
}
.actions button,
.actions a {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    text-decoration: none;   
    display: inline-block;
    font-size: 14px;
}
.actions a{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size: 14px;
}
.cancel {
    background: #e5e7eb;
    color: black;

}

.save {
    background: #2563eb;
    color: white;
}

.profile-img,
.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;

    transition: all 0.3s ease;
}


.avatar,
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;

    border: 4px solid #ffffff;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);

    position: relative;
}

/* HOVER EFFECT */
.avatar:hover img,
.profile-img:hover {
    transform: scale(1.05);
}

/* CAMERA BUTTON */
.camera {
    position: absolute;
    bottom: 5px;
    right: 5px;

    background: #2563eb;
    color: white;

    border-radius: 50%;
    padding: 6px;

    display: flex;
    align-items: center;
    justify-content: center;

    cursor: pointer;
    transition: 0.3s;
}

.camera:hover {
    background: #1d4ed8;
}
.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.remove-photo-btn{

    margin:18px auto 0;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:8px;

    width:220px;

    height:46px;

    font-size:13px;

    font-weight:700;

    color:#2563eb;

    background:#eff6ff;

    border:none;

    border-radius:14px;

    cursor:pointer;

    transition:.2s;

}

.remove-photo-btn:hover{

    background:#2563eb;

    color:white;

}

/* HOVER */
.remove-photo-btn:hover {
    background: #2563eb;
    color: #ffffff;
    border-color: #2563eb;
}

/* CLICK EFFECT */
.remove-photo-btn:active {
    transform: scale(0.96);
}

/* OPTIONAL subtle shadow (matches card style) */
.remove-photo-btn {
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
}
@media(max-width:768px){

.main{

    padding:24px 16px 50px;

}

.card{

    padding:28px 22px;

}

.actions{

    flex-direction:column;

}

.btn{

    width:100%;

}

@media(max-width:480px){

    .main{
        padding:16px 10px 40px;
    }

    .card{
        padding:20px 16px;
        border-radius:20px;
    }

    .title{
        font-size:28px;
        margin-bottom:24px;
    }

    .field input{
        height:52px;
        padding:0 16px;
        font-size:14px;
        border-radius:14px;
    }

    .remove-photo-btn{
        width:100%;
        height:42px;
        font-size:12px;
    }

}
</style>

{% endblock %}


{% block content %}
</head>

<body>

<div class="layout">

<!-- CENTER -->
<div class="main">

    <div class="card">


    <form method="POST" action="{% url 'userinfo:edit_profile' %}" 
      enctype="multipart/form-data" class="form">

    {% csrf_token %}

    <div class="avatar-wrapper">
    <div class="avatar">
        {% if profile.image %}
            <img src="{{ profile.image.url }}" id="preview">
        {% else %}
            <img src="{% static 'images/default.png' %}" id="preview">
        {% endif %}
    </div>

    <input type="file" name="profile_image" id="imageInput" hidden>

    <label for="imageInput" class="camera">
        <span class="material-symbols-outlined">photo_camera</span>
    </label>
</div>

<input type="hidden" name="remove_image" id="removeImageInput">

    <button type="button" class="remove-photo-btn" onclick="removePhoto()">
        <span class="material-symbols-outlined">delete</span>
        Remove Photo
    </button>
    

    <h2 class="title">Edit Profile</h2>

    <div class="field">
        <label>FULL NAME</label>
        <input type="text" name="full_name"
               value="{{ user.first_name }} {{ user.last_name }}">
    </div>

    <div class="field">
        <label>EMAIL ADDRESS</label>
        <input type="email" name="email"
               value="{{ user.email }}">
    </div>

    <div class="field">
        <label>PHONE NUMBER</label>
<input
    type="tel"
    name="phone"
    value="{{ profile.phone|default:'' }}"
    maxlength="10"
    required
>
    </div>

    <div class="actions">
        <a href="{% url 'userinfo:profile' %}" class="btn cancel">Cancel</a>
        <button type="submit" class="btn save">Save Changes</button>
    </div>

</form>

</div>

</div>

</div>

<script>
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

if(input && preview){
    input.addEventListener("change", function(e){
        const file = e.target.files[0];
        if(file){
            preview.src = URL.createObjectURL(file);
        }
    });
}
</script>
<script>
function removePhoto(){
    document.getElementById("removeImageInput").value = "1";

    // show default image immediately
    document.getElementById("preview").src = "{% static 'images/default.png' %}";
}
</script>
{% endblock %}
