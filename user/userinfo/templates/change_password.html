{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(rgba(20,27,43,0.7), rgba(20,27,43,0.7)),
    background: #eef2f7;
    background-size: cover;
    background-position: center;
}

.card {
    width: 100%;
    max-width: 420px;
    background: #f8fafc;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

.title {
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 25px;
}

.field {
    margin-bottom: 18px;
}

.field label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #64748b;
    display: block;
    margin-bottom: 6px;
}

.input-box {
    position: relative;
}

.input-box input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #e2e8f0;
    font-size: 14px;
}

.input-box span {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #64748b;
}

.error {
    color: red;
    font-size: 12px;
    margin-bottom: 10px;
}

.links {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.links a {
    font-size: 13px;
    text-decoration: none;
    color: #2563eb;
}

.btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg,#3a5bff,#5a78ff);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
}

.back-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #cbd5f5;
    background: white;
    font-weight: 600;
    text-align: center;
    display: block;
    text-decoration: none;
    color: #1e293b;
}
</style>
</head>

<body>

<div class="card">

    <h2 class="title">Change Password</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- CURRENT PASSWORD -->
        <div class="field">
            <label>CURRENT PASSWORD</label>
            <div class="input-box">
    <input type="password" name="old_password" required>
    <span class="material-symbols-outlined" onclick="togglePassword(this)">
        visibility
    </span>
</div>
        </div>

        <!-- NEW PASSWORD -->
        <div class="field">
            <label>NEW PASSWORD</label>
            <div class="input-box">
    <input type="password" name="new_password" required>
    <span class="material-symbols-outlined" onclick="togglePassword(this)">
        visibility
    </span>
</div>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="field">
            <label>CONFIRM NEW PASSWORD</label>
            <div class="input-box">
    <input type="password" name="confirm_password" required>
    <span class="material-symbols-outlined" onclick="togglePassword(this)">
        visibility
    </span>
</div>
        </div>

        <!-- ERROR MESSAGE -->
        {% if messages %}
    {% for message in messages %}
        {% if "password" in message.tags %}
            <div class="error">{{ message }}</div>
        {% endif %}
    {% endfor %}
{% endif %}

        
        <div class="links">
            <div></div>
            <a href="{% url "userinfo:forgot_password" %}">Forgot Password?</a>
        </div>

        
        <button type="submit" class="btn">Save Changes</button>

    </form>

    
    <a href="{% url 'userinfo:profile' %}" class="back-btn">
        Back to Profile
    </a>

</div>

<script>
function togglePassword(icon) {
    const input = icon.previousElementSibling;

    if (input.type === "password") {
        input.type = "text";
        icon.textContent = "visibility";
    } else {
        input.type = "password";
        icon.textContent = "visibility_off";
    }
}
</script>

</body>
</html>
