{% extends 'base.html' %}

{% block content %}

<style>

.success-container{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f5f7fb;

}

.success-card{

    width:500px;

    background:#fff;

    padding:50px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.success-icon{

    width:90px;

    height:90px;

    margin:auto;

    border-radius:50%;

    background:#e9fff0;

    color:#1bb55c;

    font-size:45px;

    display:flex;

    justify-content:center;

    align-items:center;

}

.success-card h1{

    margin-top:25px;

    font-size:34px;

    color:#1a1a1a;

}

.success-card p{

    margin-top:15px;

    color:#666;

    line-height:1.7;

}

.order-id{

    margin-top:20px;

    font-weight:700;

    color:#2d5cff;

}

.success-btn{

    display:block;

    margin-top:30px;

    text-decoration:none;

    background:#2d5cff;

    color:#fff;

    padding:15px;

    border-radius:10px;

    font-weight:600;

}

</style>

<div class="success-container">

    <div class="success-card">

        <div class="success-icon">

            ✓

        </div>

        <h1>

            Payment Successful

        </h1>

        <p>

            Your payment has been completed successfully.
            Your order has been placed.

        </p>

        <div class="order-id">

            Order ID :
            {{ order.order_id }}

        </div>

<a
href="{% url 'order_details' order.order_id %}"
class="success-btn"
>
    View Order
</a>

    </div>

</div>

{% endblock %}
