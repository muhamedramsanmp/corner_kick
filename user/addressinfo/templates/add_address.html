{% extends 'base.html' %}
{% load static %}

{% block title %}
Add Address
{% endblock %}


{% block extra_css %}
<style>

/* MAIN */
.main{

    width:100%;

    padding:40px 48px 70px;

    display:flex;

    justify-content:center;

}
/* CARD */
.card{

    width:100%;

    max-width:1000px;

    background:#ffffff;

    padding:40px;

    border-radius:28px;

    border:1px solid #e2e8f0;

    box-shadow:
        0 10px 30px rgba(15,23,42,.04);

}

/* TITLE */
.title{

    font-size:34px;

    font-weight:800;

    color:#0f172a;

    margin-bottom:30px;

    position:relative;

}

.title::after{

    content:"";

    width:60px;

    height:4px;

    background:#2563eb;

    position:absolute;

    left:0;

    bottom:-10px;

    border-radius:999px;

}

/* GRID */
.grid{

    display:grid;

    grid-template-columns:
        repeat(2,1fr);

    gap:28px;

}

.full {
    grid-column: span 2;
    
}

label{

    font-size:13px;

    font-weight:700;

    color:#475569;

    letter-spacing:.4px;
    

}


.form-input,
.form-textarea{

    width:100%;

    background:#eef2f7 !important;

    border:none !important;

    border-radius:20px;

    padding:18px 22px;

    margin-top:10px;

    font-size:15px;

    color:#0f172a;

    transition:.25s ease;

    appearance:none;

    -webkit-appearance:none;

    box-shadow:none;

}

/* INPUT */

.form-input{

    height:62px;

}

/* TEXTAREA */

.form-textarea{

    min-height:150px;

    resize:none;

}

/* FOCUS */

.form-input:focus,
.form-textarea:focus{

    outline:none;

    background:#eef2f7 !important;

    box-shadow:
        0 0 0 4px rgba(37,99,235,.10);

}
/* REMOVE CHROME WHITE AUTOFILL */

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
textarea:-webkit-autofill{

    -webkit-box-shadow:
        0 0 0 1000px #eef2f7 inset !important;

    -webkit-text-fill-color:#0f172a !important;

}

textarea {
    height: 80px;
}

/* ADDRESS TYPE */



.switch {
    position: relative;
    width: 40px;
    height: 20px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    background: #cbd5e1;
    border-radius: 20px;
    width: 100%;
    height: 100%;
}

.slider::before {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
}

input:checked + .slider {
    background: #2563eb;
}

input:checked + .slider::before {
    transform: translateX(20px);
}

/* ================= ADDRESS TYPE + TOGGLE ALIGN FIX ================= */

.type-group {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 30px;
}

/* LABEL STYLE */
.type-group label {
    padding: 8px 18px;
    border-radius: 20px;
    background: #e2e8f0;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: 0.2s;
    display: inline-block;
}
.type-group input[type="radio"] {
    display: none;
}
.type-group input[type="radio"]:checked + label {
    background: #2563eb;
    color: white;
}
/* ACTIVE */
.type-group input:checked + label {
    background: #2563eb;
    color: white;
}

/* WRAPPER FOR TYPE + TOGGLE */
.type-toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 25px;
}

/* TOGGLE ALIGN RIGHT */
.toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
}

/* ================= BUTTON ALIGN FIX ================= */

.actions {
    margin-top: 30px;
    display: flex;
    align-items: center;
    gap: 20px;
}

.save-btn{

    padding:15px 28px;

    background:
        linear-gradient(
            90deg,
            #2563eb,
            #3b82f6
        );

    color:white;

    border-radius:14px;

    border:none;

    font-weight:700;

    font-size:14px;

    transition:.2s;

    cursor:pointer;

}

.save-btn:hover{

    transform:translateY(-2px);

    box-shadow:
        0 12px 24px rgba(37,99,235,.22);

}

/* CANCEL TEXT STYLE */
.cancel-btn {
    font-size: 14px;
    font-weight: 600;
    color: #64748b;
    text-decoration: none;
}

.cancel-btn:hover {
    color: #2563eb;
}
.breadcrumb{
    font-size:13px;
    margin-bottom:20px;
}

.breadcrumb a{
    text-decoration:none;
    color:#6B4F3B;
    font-weight:500;
}

.breadcrumb a:hover{
    text-decoration:underline;
}

.breadcrumb span{
    color:gray;
}
.profile-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    overflow: hidden;
}

.profile-img {
    width: 100%;
    height: 100%;
    object-fit: cover;   /* 🔥 THIS IS THE KEY */
    object-position: center; /* 🔥 CENTER IMAGE */
}
@media(max-width:768px){

.main{

    padding:24px 16px 50px;

}

.card{

    padding:24px;

}

.grid{

    grid-template-columns:1fr;

}

.full{

    grid-column:span 1;

}

.type-toggle-row{

    flex-direction:column;

    align-items:flex-start;

    gap:24px;

}

.actions{

    flex-direction:column;

    align-items:stretch;

}

.save-btn{

    width:100%;

}

}

</style>

{% endblock %}


{% block content %}


<!-- LAYOUT -->
<div class="layout">

    <!-- MAIN -->
<div class="main">

<div class="card">

<div class="breadcrumb">
    <a href="{% url 'addressinfo:address_view' %}">MY ADDRESS</a>
    <span> / ADD NEW ADDRESS</span>
</div>
<div class="title">ADD ADDRESS</div>

<form method="POST">
{% csrf_token %}

<div class="grid">

<div>
<label>FULL NAME</label>
<input type="text" name="full_name" class="form-input" required>
</div>

<div>
<label>MOBILE NUMBER</label>
<input type="text" name="phone" class="form-input" required>
</div>

<div>
<label>PINCODE</label>
<input type="text" name="pincode" class="form-input" required>
</div>

<div>
<label>CITY</label>
<input type="text" name="city" class="form-input" required>
</div>

<div>
<label>STATE</label>
<input type="text" name="state" class="form-input" required>
</div>
<div>
<label>COUNTRY</label>
<input type="text" name="country" class="form-input" required>
</div>

<div class="full">
<label>ADDRESS</label>
<textarea name="address_line" class="form-textarea" required></textarea>
</div>

</div>

<!-- TYPE -->
<div class="type-toggle-row">

    <div class="type-group">
        <input type="radio" id="home" name="address_type" value="home" checked>
        <label for="home">HOME</label>

        <input type="radio" id="work" name="address_type" value="work">
        <label for="work">WORK</label>

        <input type="radio" id="other" name="address_type" value="other">
        <label for="other">OTHER</label>
    </div>

    <div class="toggle">
        <label class="switch">
            <input type="checkbox" name="is_default">
            <span class="slider"></span>
        </label>
        <span>Set as default address</span>
    </div>

</div>

<!-- BUTTONS -->
<div class="actions">
<button type="submit" class="save-btn">SAVE ADDRESS</button>

<a href="{% url 'addressinfo:address_view' %}" class="cancel-btn">
CANCEL
</a>
</div>

</form>

</div>

</div>

</div>


{% endblock %}
