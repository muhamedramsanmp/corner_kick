{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Corner Kick</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(rgba(10,15,25,0.7), rgba(10,15,25,0.7)),
    url("https://lh3.googleusercontent.com/aida-public/AB6AXuBW0JuiUNv3WaFhcjoXM6mbpK9saY0rnYCN3c-U1Mr0HsR20NzdPxMKa5yZ0GGUkOSD2s-lE_F2kgilMmLWPgG7fC9qTg8FYLDyvLQgX3zO1t7qkQ_8ASLHtpmUS9lAEnNNbexrJwL20GEQayCgWLtAiL_lSsPl7QtWYJEmgTV8-2xAq3g-7rEl0T6sJQIiOFPUvEI9AKy-hv1qqXOTtWm_Hbzaorkmo2BLB5ZtKuc3fLrN3XsNCELPEHBAoNBve_8jnZUbKFLJeTk");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: flex-end;
    align-items: center;
}

/* BG TEXT */
.bg-text {
    position: absolute;
    left: 40px;
    bottom: 40px;
    color: rgba(255,255,255,0.06);
}
.bg-text h1 {
    font-size: 80px;
    font-weight: 900;
}

/* CARD */
.card {
    width: 400px;
    background: #f3f4f6;
    padding: 32px;
    margin-right: 60px;
    border-radius: 18px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);
}

/* HEADER */
.logo {
    color: #2f5bd3;
    font-weight: 800;
    font-size: 20px;
}
.desc {
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
}

/* FIELD */
.field {
    margin-bottom: 18px;
}
.field label {
    font-size: 11px;
    font-weight: 700;
    display: block;
    margin-bottom: 6px;
}

.input-box input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #d9deee;
    font-size: 14px;
    outline: none;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg,#2f5bd3,#3b82f6);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

/* BACK */
.back {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
}
.back a {
    color: #2f5bd3;
    text-decoration: none;
    font-weight: 600;
}

/* MOBILE */
@media(max-width:900px){
    body{justify-content:center;}
    .card{margin:0;}
}
</style>

</head>
<body>

<div class="bg-text">
    <h1>CORNER KICK</h1>
</div>

<div class="card">

    <h3 class="logo">CORNER KICK</h3>
    <h2>Forgot Password</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="field">
            <label>EMAIL ADDRESS</label>
            <div class="input-box">
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>
        </div>

        <button type="submit" class="btn" href="{% url "verify_otp" %}">SUBMIT</button>

        <div class="back">
            <a href="{% url "login" %}">← Back to Login</a>
        </div>

    </form>

</div>

</body>
</html>
