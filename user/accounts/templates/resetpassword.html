{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Corner Kick</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    height: 100vh;
    display: flex;
}

/* LEFT SIDE IMAGE */
.left {
    width: 50%;
    position: relative;
}

.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.left::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(0,0,0,0.7), transparent);
}

.left-text {
    position: absolute;
    bottom: 80px;
    left: 60px;
    color: white;
}

.left-text h1 {
    font-size: 50px;
    font-weight: 900;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f3f4f6;
}

.card {
    width: 400px;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

/* HEADER */
.logo {
    font-weight: 800;
    color: #2f5bd3;
    margin-bottom: 20px;
}

.desc {
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
}

/* FIELD */
.field {
    margin-bottom: 16px;
}

.field label {
    font-size: 11px;
    font-weight: 700;
    display: block;
    margin-bottom: 6px;
}

/* INPUT */
.input-box {
    position: relative;
}

.input-box input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #d9deee;
    font-size: 14px;
    outline: none;
}

/* EYE */
.eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

/* RULES */
.rules {
    background: #eef1fb;
    padding: 15px;
    border-radius: 10px;
    font-size: 12px;
    margin-bottom: 15px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg,#2f5bd3,#3b82f6);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

/* BACK */
.back {
    text-align: center;
    margin-top: 12px;
}

.back a {
    color: #2f5bd3;
    text-decoration: none;
    font-size: 13px;
}

/* MOBILE */
@media(max-width:900px){
    .left{display:none;}
    .right{width:100%;}
}
</style>

</head>
<body>

<!-- LEFT IMAGE -->
<div class="left">
    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBr-V6p9MCIkYyYfTKwUHUAlKYNK49p-6AIWL_M864a99YkGF6hwgyCXEbAzQpF6H5oK2tZALojrS9Pq_5T36qCcX1R_izJz5MRDEmO4J50HqqyMUB9KhlLqZLhKk0gElBvkpkyQ_aqmOjf2OKSalR4cIahSD9Lmbhuu1Cu0cVhnpzppENOb5KWG20J4E2VbeVKXcePtXaSP6qliZtKdULselAwRdkt6_ipsul6XC4xvFyxQuRGDY5P03CdOMGJHs9LKSvmxN4TU9E">
    <div class="left-text">
        <h1>RECLAIM THE PITCH</h1>
    </div>
</div>

<!-- RIGHT CARD -->
<div class="right">

<div class="card">

    <h3 class="logo">CORNER KICK</h3>

    <h2>Reset Password</h2>
    <p class="desc">Create a new secure password</p>

    <form method="POST">
        {% csrf_token %}

        <!-- PASSWORD -->
        <div class="field">
            <label>NEW PASSWORD</label>
            <div class="input-box">
                <input type="password" id="password" name="password" required>
                <span class="eye" onclick="togglePassword('password')">👁</span>
            </div>
        </div>

        <!-- CONFIRM -->
        <div class="field">
            <label>CONFIRM PASSWORD</label>
            <div class="input-box">
                <input type="password" id="confirm" name="confirm_password" required>
                <span class="eye" onclick="togglePassword('confirm')">👁</span>
            </div>
        </div>

        <!-- RULES -->
        <div class="rules">
            • Minimum 8 characters <br>
            • Use uppercase & special character <br>
            • Passwords must match
        </div>

        <button type="submit" class="btn">SAVE PASSWORD</button>

        <div class="back">
            <a href="{% url "login" %}">← Back to Login</a>
        </div>

    </form>

</div>

</div>

<script>
function togglePassword(id){
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
