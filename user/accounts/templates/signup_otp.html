<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family:Arial,sans-serif;background:#f4f6f9;padding:20px;">

    <div style="
        max-width:600px;
        margin:auto;
        background:#ffffff;
        border-radius:12px;
        overflow:hidden;
        box-shadow:0 4px 12px rgba(0,0,0,.08);
    ">

        <div style="
            background:#2563eb;
            color:white;
            padding:25px;
            text-align:center;
        ">
            <h1>Corner Kick</h1>
        </div>

        <div style="padding:30px;">

            <h2>Hello {{ full_name }},</h2>

            <p>
                Welcome to Corner Kick.
            </p>

            <p>
                Use the OTP below to verify your account:
            </p>

            <div style="
                background:#eef4ff;
                text-align:center;
                padding:20px;
                border-radius:10px;
                margin:25px 0;
            ">
                <h1 style="
                    color:#2563eb;
                    letter-spacing:8px;
                    margin:0;
                ">
                    {{ otp }}
                </h1>
            </div>

            <p>
                OTP Expiry: <strong>60 seconds</strong>
            </p>

            <p>
                Do not share this OTP with anyone.
            </p>

        </div>

        <div style="
            background:#f8fafc;
            text-align:center;
            padding:15px;
            color:#64748b;
        ">
            © Corner Kick
        </div>

    </div>

</body>
</html>
