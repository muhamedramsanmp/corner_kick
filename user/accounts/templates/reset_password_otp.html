<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family:Arial,sans-serif;background:#f4f6f9;padding:20px;">

<div style="
    max-width:600px;
    margin:auto;
    background:white;
    border-radius:12px;
    overflow:hidden;
">

    <div style="
        background:#dc2626;
        color:white;
        padding:25px;
        text-align:center;
    ">
        <h1>Password Reset</h1>
    </div>

    <div style="padding:30px;">

        <h2>Hello,</h2>

        <p>
            We received a password reset request.
        </p>

        <div style="
            background:#fef2f2;
            text-align:center;
            padding:20px;
            border-radius:10px;
            margin:25px 0;
        ">
            <h1 style="
                color:#dc2626;
                letter-spacing:8px;
                margin:0;
            ">
                {{ otp }}
            </h1>
        </div>

        <p>
            OTP Expiry: <strong>60 seconds</strong>
        </p>

        <p>
            If you didn't request this, you can safely ignore this email.
        </p>

    </div>

    <div style="
        background:#f8fafc;
        text-align:center;
        padding:15px;
        color:#64748b;
    ">
        © Corner Kick
    </div>

</div>

</body>
</html>
