{% extends 'base.html' %}

{% block content %}

<style>

.failed-overlay{

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100vh;

    background:rgba(
        0,
        0,
        0,
        .55
    );

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

.failed-card{

    width:420px;

    background:#fff;

    border-radius:20px;

    padding:40px;

    text-align:center;

    box-shadow:0 20px 50px rgba(
        0,
        0,
        0,
        .15
    );

    animation:popup .3s ease;

}

@keyframes popup{

    from{

        transform:scale(.8);

        opacity:0;

    }

    to{

        transform:scale(1);

        opacity:1;

    }

}

.failed-icon{

    width:80px;

    height:80px;

    margin:0 auto 25px;

    border-radius:50%;

    background:#fff1f2;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:42px;

    color:#ef4444;

}

.failed-title{

    font-size:32px;

    font-weight:700;

    color:#172033;

    margin-bottom:15px;

}

.failed-text{

    color:#6b7280;

    line-height:1.8;

    margin-bottom:25px;

}

.failed-amount{

    font-size:26px;

    font-weight:700;

    color:#ef4444;

    margin-bottom:25px;

}

.retry-btn{

    display:block;

    width:100%;

    text-decoration:none;

    background:#2563eb;

    color:#fff;

    padding:15px;

    border-radius:12px;

    font-weight:700;

    margin-bottom:12px;

    transition:.3s;

}

.retry-btn:hover{

    opacity:.9;

}

.back-btn{

    display:block;

    width:100%;

    text-decoration:none;

    background:#f3f4f6;

    color:#374151;

    padding:15px;

    border-radius:12px;

    font-weight:600;

}

.back-btn:hover{

    background:#e5e7eb;

}

</style>

<div class="failed-overlay">

    <div class="failed-card">

        <div class="failed-icon">

            ✕

        </div>

        <h2 class="failed-title">

            Payment Failed

        </h2>

        <p class="failed-text">

            Unable to add money to your wallet.

            Please try again.

        </p>

        {% if amount %}

        <div class="failed-amount">

            ₹{{ amount }}

        </div>

        {% endif %}

        <a
        href="{% url 'wallet_page' %}"
        class="retry-btn"
        >

            Try Again

        </a>

        <a
        href="javascript:history.back()"
        class="back-btn"
        >

            Go Back

        </a>

    </div>

</div>

{% endblock %}
