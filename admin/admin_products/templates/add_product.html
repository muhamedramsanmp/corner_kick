{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

/* ================= RESET ================= */

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ================= BODY ================= */

body{
    font-family:'Inter',sans-serif;
    overflow:hidden;
    background:#000;
}

/* ================= BACKGROUND ================= */

.bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:1;
}

.bg-inner{
    width:100%;
    height:100%;

    filter:blur(2px);

    transform:scale(1.02);

    opacity:1;
}

.bg::after{
    content:"";

    position:absolute;
    inset:0;

    background:rgba(0,0,0,.76);
}

/* ================= OVERLAY ================= */

.overlay{
    position:fixed;

    inset:0;

    display:flex;

    align-items:center;

    justify-content:center;

    padding:30px;

    z-index:5;

    backdrop-filter:blur(6px);
}

/* ================= MODAL ================= */

.modal{

    width:640px;

    max-width:95%;

    max-height:90vh;

    overflow-y:auto;

    background:#0b0b0b;

    border:1px solid #1f2937;

    border-radius:24px;

    padding:30px;

    position:relative;

    box-shadow:
        0 25px 60px rgba(0,0,0,.65);

    scrollbar-width:none;
}

.modal::-webkit-scrollbar{
    display:none;
}

/* ================= CLOSE BUTTON ================= */

.close-btn{
    position:absolute;

    top:18px;
    right:18px;

    width:38px;
    height:38px;

    border:none;

    border-radius:12px;

    background:#111827;

    color:#9ca3af;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    transition:.25s;
}

.close-btn:hover{
    background:#1f2937;
    color:#fff;
}

.close-btn span{
    font-size:20px;
}

/* ================= TITLE ================= */

.modal h2{
    font-size:28px;

    font-weight:800;

    color:#fff;

    margin-bottom:6px;
}

.sub{
    color:#6b7280;

    font-size:13px;

    margin-bottom:28px;

    line-height:1.6;
}

/* ================= SECTION TITLE ================= */

.section-title{

    color:#fff;

    font-size:13px;

    font-weight:700;

    letter-spacing:1px;

    margin-top:10px;

    margin-bottom:22px;

    padding-bottom:12px;

    border-bottom:1px solid #1f2937;
}

/* ================= FIELD ================= */

.field{
    margin-bottom:22px;
}

.field label{
    display:block;

    margin-bottom:8px;

    font-size:11px;

    font-weight:700;

    letter-spacing:1px;

    color:#9ca3af;
}

/* ================= INPUTS ================= */

.field input,
.field textarea,
.field select{

    width:100%;

    background:#020617;

    border:1px solid #1e293b;

    border-radius:14px;

    padding:14px 16px;

    color:#fff;

    outline:none;

    font-size:13px;

    transition:.25s;
}

.field input:focus,
.field textarea:focus,
.field select:focus{

    border-color:#2563eb;

    box-shadow:
        0 0 0 4px rgba(37,99,235,.15);
}

.field textarea{

    resize:none;

    min-height:110px;

    line-height:1.7;
}

/* ================= PLACEHOLDER ================= */

.field input::placeholder,
.field textarea::placeholder{
    color:#475569;
}

/* ================= IMAGE UPLOAD ================= */

.upload-box{

    width:100%;

    height:180px;

    border:2px dashed #1e3a8a;

    border-radius:20px;

    background:#020b26;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    overflow:hidden;

    position:relative;

    transition:.25s;
}

.upload-box:hover{
    border-color:#3b82f6;

    background:#031133;
}

.upload-box span{

    font-size:42px;

    color:#3b82f6;

    margin-bottom:10px;
}

.upload-box h4{

    color:#fff;

    font-size:14px;

    margin-bottom:4px;
}

.upload-box p{

    color:#6b7280;

    font-size:11px;
}

.upload-box input{
    display:none;
}

/* ================= IMAGE PREVIEW ================= */

.preview{

    width:100%;
    height:100%;

    object-fit:cover;

    display:none;
}

/* ================= ROW ================= */

.row{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;
}

/* ================= STATUS BOX ================= */

.status-box{

    background:#020617;

    border:1px solid #1e293b;

    border-radius:18px;

    padding:16px 18px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-top:10px;

    margin-bottom:28px;
}

.status-text h4{

    color:#fff;

    font-size:14px;

    margin-bottom:4px;
}

.status-text p{

    color:#6b7280;

    font-size:11px;
}

/* ================= SWITCH ================= */

.switch{
    position:relative;

    width:48px;
    height:24px;
}

.switch input{
    opacity:0;

    width:0;
    height:0;
}

.slider{

    position:absolute;

    inset:0;

    background:#374151;

    border-radius:30px;

    cursor:pointer;

    transition:.3s;
}

.slider::before{

    content:"";

    position:absolute;

    width:18px;
    height:18px;

    border-radius:50%;

    background:#fff;

    top:3px;
    left:3px;

    transition:.3s;
}

.switch input:checked + .slider{
    background:#2563eb;
}

.switch input:checked + .slider::before{
    transform:translateX(24px);
}

/* ================= BUTTONS ================= */

.buttons{

    display:flex;

    gap:14px;
}

.cancel-btn{

    flex:1;

    height:50px;

    border:none;

    border-radius:14px;

    background:#111827;

    color:#9ca3af;

    font-size:14px;

    font-weight:600;

    cursor:pointer;

    transition:.25s;
}

.cancel-btn:hover{

    background:#1f2937;

    color:#fff;
}

.save-btn{

    flex:1;

    height:50px;

    border:none;

    border-radius:14px;

    background:linear-gradient(
        90deg,
        #2563eb,
        #3b82f6
    );

    color:#fff;

    font-size:14px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;
}

.save-btn:hover{

    transform:translateY(-2px);

    box-shadow:
        0 12px 24px rgba(37,99,235,.30);
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    .overlay{
        padding:14px;
    }

    .modal{

        width:100%;

        max-height:94vh;

        padding:22px;
    }

    .row{
        grid-template-columns:1fr;
    }

    .upload-box{
        height:150px;
    }

    .buttons{
        flex-direction:column;
    }

}
.required{
    color:#ef4444;
    margin-left:4px;
}
</style>

</head>

<body>

<!-- ================= BACKGROUND ================= -->

<div class="bg">

    <div class="bg-inner">

        {% include "product_management.html" %}

    </div>

</div>

<!-- ================= MODAL ================= -->

<div class="overlay">

    <div class="modal">

        <!-- CLOSE -->

        <button
            class="close-btn"
            onclick="window.history.back()"
        >

            <span class="material-symbols-outlined">
                close
            </span>

        </button>

        <!-- TITLE -->

        <h2>Add New Product</h2>

        <p class="sub">
            Create and manage your sports inventory products
        </p>

        <!-- FORM -->

       <form method="POST">

    {% csrf_token %}

    <div class="row">

        <!-- PRODUCT NAME -->

        <div class="field">

            <label>PRODUCT NAME<span class="required">*</span></label>

            <input
                type="text"
                name="product_name"
                value="{{ product.product_name }}"
                required
            >

        </div>

        <!-- CATEGORY -->

        <div class="field">

            <label>CATEGORY<span class="required">*</span></label>

            <select
                name="category"
                required
            >

                <option value="">
                    Select Category
                </option>

                {% for category in categories %}

                <option
                    value="{{ category.id }}"
                    {% if product.category.id == category.id %}
                    selected
                    {% endif %}
                >

                    {{ category.category_name }}

                </option>

                {% endfor %}

            </select>

        </div>

    </div>

    <!-- DESCRIPTION -->

    <div class="field">

        <label>DESCRIPTION</label>

        <textarea
            name="description"
        >{{ product.description }}</textarea>

    </div>

    <!-- DESCRIPTION FIT -->

    <div class="field">

        <label>DESCRIPTION & FIT</label>

        <textarea
            name="description_fit"
        >{{ product.description_fit }}</textarea>

    </div>

    <!-- MATERIALS -->

    <div class="field">

        <label>MATERIALS & SUSTAINABILITY</label>

        <textarea
            name="materials"
        >{{ product.materials }}</textarea>

    </div>

    <!-- CARE GUIDE -->

    <div class="field">

        <label>DETAILED CARE GUIDE</label>

        <textarea
            name="care_guide"
        >{{ product.care_guide }}</textarea>

    </div>

    <!-- SHIPPING -->

    <div class="field">

        <label>SHIPPING & RETURNS POLICY</label>

        <textarea
            name="delivery_returns"
        >{{ product.delivery_returns }}</textarea>

    </div>

    <!-- STATUS -->

    <div class="status-box">

        <div class="status-text">

            <h4>Product Status</h4>

            <p>Enable this product in storefront</p>

        </div>

        <label class="switch">

            <input
                type="checkbox"
                name="is_active"
                {% if product.is_active %}
                checked
                {% endif %}
            >

            <span class="slider"></span>

        </label>

    </div>

    <!-- BUTTONS -->

    <div class="buttons">

        <button
            type="button"
            class="cancel-btn"
            onclick="window.history.back()"
        >
            Cancel
        </button>

        <button
            type="submit"
            class="save-btn"
        >
            Update Product
        </button>

    </div>

</form>

    </div>

</div>

<!-- ================= IMAGE PREVIEW ================= -->

<script>

function previewFile(event){

    const file = event.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(){

            document.getElementById("previewImage").src = reader.result;

            document.getElementById("previewImage").style.display = "block";

            document.getElementById("uploadContent").style.display = "none";

        }

        reader.readAsDataURL(file);

    }

}

</script>

</body>
</html>
