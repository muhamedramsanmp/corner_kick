{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delete Variant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ================= BODY ================= */

body{
    font-family:'Inter',sans-serif;
    overflow:hidden;
    background:#000;
}

/* ================= BACKGROUND ================= */

.bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:1;
}

.bg-inner{
    width:100%;
    height:100%;

    filter:blur(3px);

    transform:scale(1.02);

    opacity:1;
}

.bg::after{
    content:"";

    position:absolute;
    inset:0;

    background:rgba(0,0,0,.78);
}

/* ================= OVERLAY ================= */

.overlay{
    position:fixed;

    inset:0;

    display:flex;

    align-items:center;

    justify-content:center;

    padding:24px;

    z-index:5;

    backdrop-filter:blur(8px);
}

/* ================= MODAL ================= */

.modal{

    width:430px;

    max-width:100%;

    background:#0b0b0b;

    border:1px solid #1f2937;

    border-radius:28px;

    padding:34px 30px 30px;

    text-align:center;

    position:relative;

    box-shadow:
        0 30px 80px rgba(0,0,0,.75);

    animation:popup .25s ease;
}

/* ================= ANIMATION ================= */

@keyframes popup{

    from{
        opacity:0;
        transform:scale(.88);
    }

    to{
        opacity:1;
        transform:scale(1);
    }

}

/* ================= CLOSE ================= */

.close-btn{

    position:absolute;

    top:18px;
    right:18px;

    width:40px;
    height:40px;

    border:none;

    border-radius:12px;

    background:#111827;

    color:#9ca3af;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    transition:.25s;
}

.close-btn:hover{

    background:#1f2937;

    color:#fff;
}

/* ================= ICON ================= */

.icon{

    width:86px;
    height:86px;

    margin:0 auto 24px;

    border-radius:50%;

    background:rgba(239,68,68,.12);

    display:flex;

    align-items:center;

    justify-content:center;

    border:1px solid rgba(239,68,68,.18);
}

.icon span{

    font-size:40px;

    color:#ef4444;
}

/* ================= TITLE ================= */

.modal h2{

    font-size:34px;

    font-weight:800;

    color:#fff;

    margin-bottom:14px;
}

/* ================= TEXT ================= */

.modal p{

    color:#9ca3af;

    font-size:15px;

    line-height:1.8;

    margin-bottom:26px;
}

/* ================= WARNING ================= */

.warning{

    width:100%;

    padding:16px;

    border-radius:16px;

    background:rgba(127,29,29,.22);

    border:1px solid rgba(239,68,68,.18);

    display:flex;

    align-items:center;

    gap:10px;

    color:#ef4444;

    font-size:13px;

    font-weight:600;

    margin-bottom:28px;
}

.warning span{
    font-size:18px;
}

/* ================= BUTTONS ================= */

.buttons{

    display:flex;

    flex-direction:column;

    gap:14px;
}

/* REMOVE */

.remove-btn{

    width:100%;
    height:56px;

    border:none;

    border-radius:16px;

    background:linear-gradient(
        90deg,
        #ef4444,
        #f43f5e
    );

    color:#fff;

    font-size:15px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;
}

.remove-btn:hover{

    transform:translateY(-2px);

    box-shadow:
        0 12px 24px rgba(239,68,68,.28);
}

/* CANCEL */

.cancel-btn{

    width:100%;
    height:54px;

    border:none;

    border-radius:16px;

    background:#111827;

    color:#fff;

    font-size:14px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;
}

.cancel-btn:hover{
    background:#1f2937;
}

/* ================= MOBILE ================= */

@media(max-width:500px){

    .modal{
        padding:30px 22px 24px;
    }

    .modal h2{
        font-size:28px;
    }

}

</style>

</head>

<body>

<!-- ================= BACKGROUND ================= -->

<div class="bg">

    <div class="bg-inner">

        {% include "variant_management.html" %}

    </div>

</div>

<!-- ================= MODAL ================= -->

<div class="overlay">

    <div class="modal">

        <!-- CLOSE -->
<button
    class="close-btn"
    onclick="location.href='{% url "admin_products:variant_management" product.id %}'"
>

    <span class="material-symbols-outlined">
        close
    </span>

</button>

        <!-- ICON -->

        <div class="icon">

            <span class="material-symbols-outlined">
                delete
            </span>

        </div>

        <!-- TITLE -->

        <h2>
            Remove Variant?
        </h2>

        <!-- DESCRIPTION -->

        <p>

            Are you sure you want to remove this
            variant? This action will permanently
            delete the variant and its associated
            stock data.

        </p>

        <!-- WARNING -->

        <div class="warning">

            <span class="material-symbols-outlined">
                warning
            </span>

            This action cannot be undone.

        </div>

        <!-- FORM -->

        <form method="POST">

            {% csrf_token %}

            <!-- BUTTONS -->

            <div class="buttons">

                <!-- REMOVE -->

                <button
                    type="submit"
                    class="remove-btn"
                >
                    REMOVE
                </button>

                <!-- CANCEL -->

<button
    type="button"
    class="cancel-btn"
    onclick="location.href='{% url "admin_products:variant_management" product.id %}'"
>
    CANCEL
</button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
