{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Category</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    overflow:hidden;
    background:#000;
}

/* ================= BACKGROUND ================= */

.bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:1;
}

.bg-inner{
    width:100%;
    height:100%;

    filter:blur(2px);

    transform:scale(1.02);

    opacity:10;
}

.bg::after{
    content:"";

    position:absolute;
    inset:0;

    background:rgba(0,0,0,.68);
}

/* ================= OVERLAY ================= */

.overlay{
    position:fixed;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:5;

    padding:12px;
}

/* ================= MODAL ================= */

.modal{
    width:380px;

    background:#0b0b0b;

    border:1px solid #1f2937;

    border-radius:16px;

    padding:18px;

    position:relative;

    box-shadow:0 25px 60px rgba(0,0,0,.6);
}

/* CLOSE BUTTON */

.close-btn{
    position:absolute;

    top:12px;
    right:12px;

    background:none;
    border:none;

    color:#9ca3af;

    cursor:pointer;
}

.close-btn span{
    font-size:20px;
}

/* ================= TITLE ================= */

.modal h2{
    font-size:19px;
    font-weight:700;

    color:#fff;

    margin-bottom:4px;
}

.sub{
    color:#6b7280;

    font-size:11px;

    margin-bottom:16px;
}

/* ================= FIELD ================= */

.field{
    margin-bottom:14px;
}

.field label{
    display:block;

    margin-bottom:7px;

    font-size:10px;
    font-weight:700;

    letter-spacing:1px;

    color:#9ca3af;
}

/* ================= INPUT ================= */

.field input,
.field textarea{
    width:100%;

    background:#020617;

    border:1px solid #1e293b;

    border-radius:10px;

    padding:9px 12px;

    color:#fff;

    outline:none;

    font-size:13px;
}

.field textarea{
    resize:none;
    height:58px;
}

.field input:focus,
.field textarea:focus{
    border-color:#2563eb;
}

/* ================= IMAGE BOX ================= */

.upload-box{
    width:100%;
    height:90px;

    border:2px dashed #1e3a8a;

    border-radius:14px;

    background:#020b26;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    overflow:hidden;

    position:relative;
}

.upload-box:hover{
    border-color:#3b82f6;
}

/* ICON */

.upload-box span{
    font-size:28px;
    color:#3b82f6;

    margin-bottom:5px;
}

/* TEXT */

.upload-box h4{
    color:#fff;
    font-size:11px;
    margin-bottom:2px;
}

.upload-box p{
    color:#6b7280;
    font-size:9px;
}

/* HIDE INPUT */

.upload-box input{
    display:none;
}

/* IMAGE PREVIEW */

.preview{
    width:100%;
    height:100%;
    object-fit:cover;

    display:none;
}

/* ================= STATUS ================= */

.status-box{
    background:#020617;

    border:1px solid #1e293b;

    border-radius:12px;

    padding:10px 12px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:16px;
}

.status-text h4{
    color:#fff;
    font-size:12px;
    margin-bottom:2px;
}

.status-text p{
    color:#6b7280;
    font-size:10px;
}

/* ================= SWITCH ================= */

.switch{
    position:relative;
    width:40px;
    height:20px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    inset:0;

    background:#374151;

    border-radius:30px;

    transition:.3s;

    cursor:pointer;
}

.slider::before{
    content:"";

    position:absolute;

    width:14px;
    height:14px;

    border-radius:50%;

    background:#fff;

    top:3px;
    left:3px;

    transition:.3s;
}

.switch input:checked + .slider{
    background:#2563eb;
}

.switch input:checked + .slider::before{
    transform:translateX(18px);
}

/* ================= BUTTONS ================= */

.buttons{
    display:flex;
    gap:10px;
}

/* CANCEL */

.cancel-btn{
    flex:1;

    height:40px;

    border:none;

    border-radius:10px;

    background:#111827;

    color:#9ca3af;

    font-weight:600;

    font-size:13px;

    cursor:pointer;

    transition:.2s;
}

.cancel-btn:hover{
    background:#1f2937;
}

/* SAVE */

.save-btn{
    flex:1;

    height:40px;

    border:none;

    border-radius:10px;

    background:linear-gradient(90deg,#2563eb,#3b82f6);

    color:#fff;

    font-weight:700;

    font-size:13px;

    cursor:pointer;

    transition:.2s;
}

.save-btn:hover{
    transform:translateY(-1px);
}

/* ================= MOBILE ================= */

@media(max-width:500px){

    .modal{
        width:100%;
    }

}
/* ================= ERROR ================= */

.error-box{

    background:rgba(127,29,29,.20);

    border:1px solid #ef4444;

    color:#ef4444;

    padding:10px 12px;

    border-radius:10px;

    font-size:12px;

    display:flex;

    align-items:center;

    gap:8px;

    margin-bottom:14px;
}

.error-box span{
    font-size:18px;
}
.required{
    color:#ef4444;
    margin-left:4px;
}
</style>
</head>

<body>

<!-- ================= BACKGROUND ================= -->

<div class="bg">

    <div class="bg-inner">

        {% include "category_management.html" %}

    </div>

</div>

<!-- ================= MODAL ================= -->

<div class="overlay">

    <div class="modal">

        <!-- CLOSE -->

        <button class="close-btn" onclick="window.history.back()">

            <span class="material-symbols-outlined">
                close
            </span>

        </button>

        <!-- TITLE -->

        <h2>Add New Category</h2>

        <p class="sub">
            Create a new category for your products
        </p>

        <!-- FORM -->

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <!-- IMAGE -->

            <div class="field">

                <label>CATEGORY IMAGE</label>

                <label class="upload-box">

                    <img id="previewImage" class="preview">

                    <div id="uploadContent">

                        <span class="material-symbols-outlined">
                            upload
                        </span>

                        <h4>Upload Category Icon</h4>

                        <p>PNG, JPG up to 5MB</p>

                    </div>

                    <input
                        type="file"
                        name="image"
                        accept="image/*"
                        onchange="previewFile(event)"
                    >

                </label>

            </div>

            <!-- NAME -->

            <div class="field">

                <label>CATEGORY NAME<span class="required">*</span></label>

                <input
                    type="text"
                    name="name"
                    placeholder="Enter category name..."
                    required
                >

            </div>

            <!-- DESCRIPTION -->

            <div class="field">

                <label>DESCRIPTION</label>

                <textarea
                    name="description"
                    placeholder="Describe this category..."
                ></textarea>

            </div>

            <!-- STATUS -->

            <div class="status-box">

                <div class="status-text">

                    <h4>Active Status</h4>

                    <p>Enable this category in storefront</p>

                </div>

                <label class="switch">

                    <input
                        type="checkbox"
                        name="is_active"
                        checked
                    >

                    <span class="slider"></span>

                </label>

            </div>

            <!-- BUTTONS -->

            <div class="buttons">

                <button
                    type="button"
                    class="cancel-btn"
                    onclick="window.history.back()"
                >
                    Cancel
                </button>

                <button
                    type="submit"
                    class="save-btn"
                >
                    Save Category
                </button>

            </div>

        </form>

    </div>

</div>

<!-- ================= IMAGE PREVIEW ================= -->

<script>

function previewFile(event){

    const file = event.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(){

            document.getElementById("previewImage").src = reader.result;

            document.getElementById("previewImage").style.display = "block";

            document.getElementById("uploadContent").style.display = "none";
        }

        reader.readAsDataURL(file);
    }

}

</script>

</body>
</html>
