{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Category</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    overflow:hidden;
    background:#000;
}

/* ================= BACKGROUND ================= */

.bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:1;
}

.bg-inner{
    width:100%;
    height:100%;
    filter:blur(2px);
    transform:scale(1.02);
    opacity:10;
}

.bg::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
}

/* ================= OVERLAY ================= */

.overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:5;
    padding:12px;
}

/* ================= MODAL ================= */

.modal{
    width:360px;
    background:#0b0b0b;
    border:1px solid #1f2937;
    border-radius:16px;
    padding:20px;
    position:relative;
    box-shadow:0 25px 60px rgba(0,0,0,.6);
}

/* CLOSE BUTTON */

.close-btn{
    position:absolute;
    top:14px;
    right:14px;
    background:none;
    border:none;
    color:#9ca3af;
    cursor:pointer;
}

.close-btn span{
    font-size:20px;
}

/* ================= TITLE ================= */

.modal h2{
    font-size:18px;
    font-weight:600;
    color:#fff;
    margin-bottom:18px;
    letter-spacing:.5px;
}

/* ================= FIELD ================= */

.field{
    margin-bottom:16px;
}

.field label{
    display:block;
    margin-bottom:7px;
    font-size:10px;
    font-weight:700;
    letter-spacing:1px;
    color:#6b7280;
}

/* ================= INPUT ================= */

.field input,
.field textarea{
    width:100%;
    background:#061130;
    border:1px solid #1e3a8a;
    border-radius:8px;
    padding:10px 12px;
    color:#fff;
    outline:none;
    font-size:13px;
}

.field textarea{
    resize:none;
    height:68px;
}

.field input:focus,
.field textarea:focus{
    border-color:#3b82f6;
}

/* ================= ERROR ================= */

.error-box{
    background:rgba(127,29,29,.25);
    border:1px solid #b91c1c;
    color:#ef4444;
    border-radius:8px;
    padding:10px;
    font-size:11px;
    margin-top:8px;
    display:flex;
    align-items:center;
    gap:6px;
}

.error-box span{
    font-size:15px;
}

/* ================= STATUS ================= */

.status-box{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    margin-bottom:22px;
}

.status-text h4{
    color:#fff;
    font-size:11px;
    margin-bottom:3px;
    letter-spacing:1px;
}

.status-text p{
    color:#6b7280;
    font-size:10px;
}

/* ================= SWITCH ================= */

.switch{
    position:relative;
    width:42px;
    height:22px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    inset:0;
    background:#374151;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

.slider::before{
    content:"";
    position:absolute;
    width:16px;
    height:16px;
    left:3px;
    top:3px;
    background:#fff;
    border-radius:50%;
    transition:.3s;
}

.switch input:checked + .slider{
    background:#2563eb;
}

.switch input:checked + .slider::before{
    transform:translateX(20px);
}

/* ================= BUTTONS ================= */

.buttons{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.cancel-btn{
    width:70px;
    height:36px;
    border-radius:8px;
    border:1px solid #1f2937;
    background:transparent;
    color:#d1d5db;
    font-size:12px;
    cursor:pointer;
}

.save-btn{
    height:36px;
    padding:0 18px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:#fff;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
}

.save-btn:hover{
    background:#3b82f6;
}

/* ================= MOBILE ================= */

@media(max-width:500px){

    .modal{
        width:100%;
    }

}
/* ================= IMAGE BOX ================= */

.upload-box{
    width:100%;
    height:90px;

    border:2px dashed #1e3a8a;

    border-radius:14px;

    background:#020b26;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    overflow:hidden;

    position:relative;
}

.upload-box:hover{
    border-color:#3b82f6;
}

.upload-box span{
    font-size:28px;
    color:#3b82f6;
    margin-bottom:5px;
}

.upload-box h4{
    color:#fff;
    font-size:11px;
    margin-bottom:2px;
}

.upload-box p{
    color:#6b7280;
    font-size:9px;
}

.upload-box input{
    display:none;
}

.preview{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}
.input-error{
     border:1px solid #ef4444 !important; 
}.input-error:focus{
     border-color:#ef4444 !important;
      box-shadow:0 0 0 2px rgba(239,68,68,.2); 
}
</style>
</head>

<body>

<!-- ================= BACKGROUND ================= -->

<div class="bg">

    <div class="bg-inner">

        {% include "category_management.html" %}

    </div>

</div>

<!-- ================= MODAL ================= -->

<div class="overlay">

    <div class="modal">

        <!-- CLOSE -->

        <button class="close-btn" onclick="window.history.back()">

            <span class="material-symbols-outlined">
                close
            </span>

        </button>

        <!-- TITLE -->

        <h2>EDIT CATEGORY</h2>

        <!-- FORM -->

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <!-- CATEGORY NAME -->

            <div class="field">

                <label>CATEGORY NAME</label>

<input type="text" name="name" 
value="{% if request.method == 'POST' %}{{ request.POST.name }}{% else %}{{ category.category_name }}{% endif %}"
placeholder="Enter category name..." 
class="{% if errors.category_name %}input-error{% endif %}" >

{% if errors.category_name %} 
<div class="error-box"> <span class="material-symbols-outlined"> error </span> 
    {{ errors.category_name }} </div> {% endif %}
            </div>

            <!-- CATEGORY IMAGE -->

<div class="field">

    <label>CATEGORY IMAGE</label>

    <label class="upload-box">

        {% if category.category_img %}

            <img
                id="previewImage"
                class="preview"
                src="{{ category.category_img.url }}"
                style="display:block;"
            >

        {% else %}

            <img
                id="previewImage"
                class="preview"
            >

        {% endif %}

        <div
            id="uploadContent"
            {% if category.category_img %}
                style="display:none;"
            {% endif %}
        >

            <span class="material-symbols-outlined">
                upload
            </span>

            <h4>Upload Category Image</h4>

            <p>PNG, JPG up to 5MB</p>

        </div>

        <input
            type="file"
            name="category_img"
            accept="image/*"
            onchange="previewFile(event)"
        >

    </label>

</div>

            <!-- DESCRIPTION -->

            <div class="field">

                <label>DESCRIPTION</label>

<textarea
    name="description"
    placeholder="Describe this category..."
>{{ category.description|default:'' }}</textarea>
            </div>

            <!-- STATUS -->

            <div class="status-box">

                <div class="status-text">

                    <h4>ACTIVE STATUS</h4>

                    <p>Enable this category for public display</p>

                </div>

                <label class="switch">
                <input
                type="checkbox"
                name="is_active"
                {% if category.is_active %}
                checked
                {% endif %}
                >

                    <span class="slider"></span>

                </label>

            </div>

            <!-- BUTTONS -->

            <div class="buttons">

                <button
                    type="button"
                    class="cancel-btn"
                    onclick="window.history.back()"
                >
                    Cancel
                </button>

                <button
                    type="submit"
                    class="save-btn"
                >
                    Update Category
                </button>

            </div>

        </form>

    </div>

</div>
<script>

function previewFile(event){

    const file = event.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(){

            document.getElementById("previewImage").src = reader.result;

            document.getElementById("previewImage").style.display = "block";

            document.getElementById("uploadContent").style.display = "none";
        }

        reader.readAsDataURL(file);
    }

}

</script>
</body>
</html>
